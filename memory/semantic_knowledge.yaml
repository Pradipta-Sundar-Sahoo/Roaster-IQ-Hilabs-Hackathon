source_systems:
  AvailityPDM:
    description: Primary electronic data interchange platform for provider data. Handles
      most commercial and Medicare roster submissions.
    full_name: Availity Provider Data Management
  DPE:
    description: Automated data feeds from integrated systems.
    full_name: Data Processing Engine
  Demographic:
    description: Demographic data submission channel for provider demographic information
      updates.
  PDM:
    description: Direct provider data management submissions.
    full_name: Provider Data Management
  ProviderGroup:
    description: Group practice enrollment submissions for provider organizations.
