cross_table_relationships:
  failure_correlation: High IS_FAILED rates in CSV1 for a state should correlate with
    lower SCS_PERCENT in CSV2 for the same market
  retry_linkage: CSV1.RUN_NO > 1 represents retry attempts that connect to CSV2.NEXT_ITER_SCS_CNT
    (retry success counts)
  state_to_market: CSV1.CNT_STATE maps directly to CSV2.MARKET for state-level correlation
  temporal_alignment: CSV1.FILE_RECEIVED_DT month maps to CSV2.MONTH for temporal
    analysis
data_notes:
  missing_columns: The problem statement mentions TOT_REC_CNT, SCS_REC_CNT, FAIL_REC_CNT,
    SKIP_REC_CNT, REJ_REC_CNT, SCS_PCT but these are not present in the actual CSV.
    We use IS_FAILED, FAILURE_STATUS, and health flags as quality proxies.
  proxy_strategy: IS_FAILED (0/1) gives file-level pass/fail. FAILURE_STATUS categorizes
    failure type. The 7 health columns provide per-stage quality signals.
failure_statuses:
  Complete Validation Failure:
    implication: Likely schema mismatch, corrupt source data, or non-conformant data
      format
    meaning: All records in the file failed validation checks
    severity: critical
  Failed:
    implication: Requires investigation of specific stage where failure occurred
    meaning: Generic processing failure during pipeline execution
    severity: high
  Incompatible:
    implication: Source system may have changed its output format without notification
    meaning: File format or content incompatible with expected source system schema
    severity: high
  Stuck:
    implication: May need manual intervention or system issue resolution
    meaning: RO has not progressed beyond current stage within expected SLA
    severity: medium
file_status_codes:
  9: STOPPED - Processing halted, may indicate failure or manual hold
  45: DART_REVIEW - File is in DART review stage
  49: DART_GENERATION - File is being processed through DART generation
  99: RESOLVED - Successfully completed all pipeline stages
health_flag_note: SPS_LOAD_HEALTH is special - it is derived from record success percentage
  (SCS_PCT), not from duration.
health_flags:
  Green: Duration within normal range (< 1.5x historical average). No action needed.
  Red: Duration critically exceeded (> 2x historical average) or stage failure. Immediate
    attention required.
  Yellow: Duration elevated (1.5x - 2x historical average). Monitor closely.
key_metrics:
  is_failed: Boolean flag - 1 means the RO has encountered a processing failure
  is_stuck: Boolean flag - 1 means the RO has not progressed past its current stage
    beyond the expected SLA timeframe
  run_no: Processing iteration number. 1 = initial run, >1 = reprocessing/retry attempt.
    Compare RUN_NO=1 vs RUN_NO>1 for retry effectiveness
  scs_percent: Overall transaction success rate in CSV2 - key market-level health
    indicator
latest_stage_values:
  DART_GENERATION: Currently generating DART validation reports
  DART_REVIEW: Currently in DART review - awaiting validation
  RESOLVED: Successfully completed all processing stages
  STOPPED: Processing has been halted - requires investigation
lob_meanings:
  Commercial: Private employer-sponsored or individual market insurance plans
  Commercial EPO: Exclusive Provider Organization - commercial plan requiring in-network
    care
  Commercial HMO: Health Maintenance Organization - commercial managed care plan
  Commercial PPO: Preferred Provider Organization - commercial plan with network flexibility
  Medicaid: Federal/state program providing health coverage to eligible low-income
    adults, children, pregnant women
  Medicaid FFS: Medicaid Fee-For-Service - traditional pay-per-service Medicaid
  Medicaid HMO: Managed care Medicaid plans
  Medicare: Federal health insurance for people 65+, certain younger disabled individuals,
    and those with End-Stage Renal Disease
  Medicare HMO: Medicare Advantage HMO plans - managed care Medicare
