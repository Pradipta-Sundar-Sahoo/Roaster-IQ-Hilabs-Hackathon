cross_table_relationships:
  failure_correlation: High IS_FAILED rates in CSV1 for a state should correlate with
    lower SCS_PERCENT in CSV2 for the same market
  retry_linkage: CSV1.RUN_NO > 1 represents retry attempts that connect to CSV2.NEXT_ITER_SCS_CNT
    (retry success counts)
  state_to_market: CSV1.CNT_STATE maps directly to CSV2.MARKET for state-level correlation
  temporal_alignment: CSV1.FILE_RECEIVED_DT month maps to CSV2.MONTH for temporal
    analysis
data_notes:
  federal_vs_state_roster_submission_requirements: Web search for "federal vs state
    roster submission requirements" did not yield specific regulatory differences
    for *provider* roster submissions. Results were related to FHA appraisers/inspectors
    and arbitrators. This suggests that general federal vs. state distinctions for
    provider rosters might not be easily found through broad searches, or the specific
    regulations are embedded within LOB-specific (e.g., Medicare vs. Medicaid) guidelines
    rather than general "roster" rules.
  missing_columns: The problem statement mentions TOT_REC_CNT, SCS_REC_CNT, FAIL_REC_CNT,
    SKIP_REC_CNT, REJ_REC_CNT, SCS_PCT but these are not present in the actual CSV.
    We use IS_FAILED, FAILURE_STATUS, and health flags as quality proxies.
  proxy_strategy: IS_FAILED (0/1) gives file-level pass/fail. FAILURE_STATUS categorizes
    failure type. The 7 health columns provide per-stage quality signals.
failure_statuses:
  Complete Validation Failure:
    implication: Likely schema mismatch, corrupt source data, or non-conformant data
      format
    meaning: All records in the file failed validation checks
    severity: critical
  Failed:
    implication: Requires investigation of specific stage where failure occurred
    meaning: Generic processing failure during pipeline execution
    severity: high
  Incompatible:
    implication: Source system may have changed its output format without notification
    meaning: File format or content incompatible with expected source system schema
    severity: high
  Stuck:
    implication: May need manual intervention or system issue resolution
    meaning: RO has not progressed beyond current stage within expected SLA
    severity: medium
file_status_codes:
  9: STOPPED - Processing halted, may indicate failure or manual hold
  45: DART_REVIEW - File is in DART review stage
  49: DART_GENERATION - File is being processed through DART generation
  99: RESOLVED - Successfully completed all pipeline stages
health_flag_note: SPS_LOAD_HEALTH is special - it is derived from record success percentage
  (SCS_PCT), not from duration.
health_flags:
  Green: Duration within normal range (< 1.5x historical average). No action needed.
  Red: Duration critically exceeded (> 2x historical average) or stage failure. Immediate
    attention required.
  Yellow: Duration elevated (1.5x - 2x historical average). Monitor closely.
key_metrics:
  is_failed: Boolean flag - 1 means the RO has encountered a processing failure
  is_stuck: Boolean flag - 1 means the RO has not progressed past its current stage
    beyond the expected SLA timeframe
  run_no: Processing iteration number. 1 = initial run, >1 = reprocessing/retry attempt.
    Compare RUN_NO=1 vs RUN_NO>1 for retry effectiveness
  scs_percent: Overall transaction success rate in CSV2 - key market-level health
    indicator
latest_stage_values:
  DART_GENERATION: Currently generating DART validation reports
  DART_REVIEW: Currently in DART review - awaiting validation
  RESOLVED: Successfully completed all processing stages
  STOPPED: Processing has been halted - requires investigation
lob_analysis_guidance:
  hmo_vs_ffs: HMO failures are more critical than FFS because HMO patients MUST use
    in-network providers. A rejected provider record in HMO means patients lose access.
  rejection_by_lob: High rejections on Medicare HMO but not Commercial PPO suggests
    a Medicare compliance problem (CMS rule change), not general data quality. High
    rejections on KS Medicaid but not CA Medicaid suggests a Kansas state rule issue,
    not an org-wide problem.
  same_org_different_lob: Same provider org + same state + different LOBs = separate
    roster files = separate ROs. Each file has different validation rules and can
    succeed/fail independently.
  strictness_hierarchy: Medicare HMO > Medicare FFS > Medicaid HMO > Medicaid FFS
    > Commercial EPO > Commercial HMO > Commercial PPO > Indemnity
lob_meanings:
  Commercial:
    description: Private employer-sponsored or individual market insurance plans
    regulator: Employer/Payer (least government regulation)
    roster_impact: Most flexible data formats accepted, least strict compliance requirements
    strictness: low
  Commercial EPO:
    description: Exclusive Provider Organization — in-network only (except emergencies),
      stricter than PPO
    regulator: Employer/Payer
    roster_impact: Similar strictness to HMO but commercial regulation level
    strictness: low-medium
  Commercial HMO:
    description: Health Maintenance Organization — commercial managed care, in-network
      only
    regulator: Employer/Payer
    roster_impact: Similar to Medicare HMO in structure but less regulatory oversight
    strictness: low-medium
  Commercial PPO:
    description: Preferred Provider Organization — in-network cheaper, out-of-network
      allowed but expensive
    regulator: Employer/Payer
    roster_impact: Most common employer insurance plan. Flexible, fewer rejections
      expected.
    strictness: low
  Indemnity:
    description: Traditional fee-for-service insurance with no network restrictions
    regulator: Employer/Payer
    roster_impact: Minimal roster accuracy impact
    strictness: low
  Medicaid:
    description: Federal/state program providing health coverage to eligible low-income
      adults, children, pregnant women
    regulator: State government + Federal (jointly funded)
    roster_impact: Rules are STATE-SPECIFIC. KS Medicaid rules differ from CA Medicaid
      rules. A roster valid for CA Medicaid may be rejected for KS Medicaid. Each
      state has its own Medicaid agency.
    strictness: medium-high
  Medicaid FFS:
    description: Medicaid Fee-For-Service — traditional pay-per-service model
    regulator: State government
    roster_impact: More flexible than HMO but still subject to state-level validation
      rules
    strictness: medium
  Medicaid HMO:
    description: Managed care Medicaid — patient must use in-network providers
    regulator: State government
    roster_impact: Network accuracy matters. Rejection removes provider from directory,
      affecting low-income patient access.
    strictness: medium-high
  Medicare:
    description: Federal health insurance for people 65+, certain younger disabled
      individuals, and those with End-Stage Renal Disease
    regulator: CMS (Federal)
    roster_impact: CMS sets strict rules — provider NPI must be valid and active,
      credentialing requirements very high, rule changes are federal-level affecting
      all states simultaneously
    strictness: highest
  Medicare FFS:
    description: Medicare Fee-For-Service — patient can see any provider, in-network
      is cheaper
    regulator: CMS (Federal)
    roster_impact: Less critical than HMO for directory accuracy but still important
      for cost transparency
    strictness: high
  Medicare HMO:
    description: Medicare Advantage HMO — managed care Medicare, patient must use
      in-network providers only
    regulator: CMS (Federal)
    roster_impact: Directory accuracy is CRITICAL. If a provider record is rejected,
      they disappear from the network directory, patients can't see them as in-network,
      claims get denied, payer gets fined.
    strictness: highest
  UniCare:
    description: UniCare brand health plans (Anthem subsidiary)
    regulator: Employer/Payer
    roster_impact: Commercial-equivalent compliance requirements
    strictness: low
