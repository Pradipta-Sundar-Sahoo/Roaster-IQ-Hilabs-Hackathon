pipeline_stages:
- description: File received from source system, initial format validation and checksum
    verification
  name: INGESTION
  next_stage: PRE_PROCESSING
- description: Data cleansing, normalization, field mapping preparation. Red health
    means duration exceeds 2x historical average, often caused by large files or malformed
    records.
  duration_column: PRE_PROCESSING_DURATION
  health_column: PRE_PROCESSING_HEALTH
  name: PRE_PROCESSING
  next_stage: MAPPING_APPROVAL
- description: Manual or automated approval of field mapping rules between source
    and target schemas
  duration_column: MAPPING_APROVAL_DURATION
  health_column: MAPPING_APROVAL_HEALTH
  name: MAPPING_APPROVAL
  next_stage: ISF_GENERATION
- description: Internal Standard Format generation - transforms provider data to canonical
    schema for downstream processing
  duration_column: ISF_GEN_DURATION
  health_column: ISF_GEN_HEALTH
  name: ISF_GENERATION
  next_stage: DART_GENERATION
- avg_duration_column: AVG_DART_GENERATION_DURATION
  description: Data Accuracy Review Tool - generates validation reports checking data
    against business rules and compliance standards
  duration_column: DART_GEN_DURATION
  health_column: DART_GEN_HEALTH
  name: DART_GENERATION
  next_stage: DART_REVIEW
- description: Review period for DART-generated validation reports before UI validation
  duration_column: DART_REVIEW_DURATION
  health_column: DART_REVIEW_HEALTH
  name: DART_REVIEW
  next_stage: DART_UI_VALIDATION
- avg_duration_column: AVG_DART_UI_VLDTN_DURATION
  description: Human review and validation of DART reports through the UI interface
  duration_column: DART_UI_VALIDATION_DURATION
  health_column: DART_UI_VALIDATION_HEALTH
  name: DART_UI_VALIDATION
  next_stage: SPS_LOAD
- avg_duration_column: AVG_SPS_LOAD_DURATION
  description: Final load into Shared Provider Services database - the terminal processing
    stage
  duration_column: SPS_LOAD_DURATION
  health_column: SPS_LOAD_HEALTH
  name: SPS_LOAD
  next_stage: RESOLVED
